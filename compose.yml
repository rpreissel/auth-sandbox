name: auth-sandbox

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    restart: unless-stopped
    command:
      - start-dev
      - --proxy-headers=xforwarded
      - --hostname=https://keycloak.localhost:8443
      - --hostname-strict=false
      - --features=jwt-authorization-grant,par
    env_file: .env
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./keycloak-extension/build/libs:/opt/keycloak/providers:ro
    depends_on:
      postgres:
        condition: service_healthy

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${DEVICE_POSTGRES_USER}
      DB_PASSWORD: ${DEVICE_POSTGRES_PASSWORD}
      JWT_PRIVATE_KEY_PATH: /etc/auth-service/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /etc/auth-service/keys/public.pem
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-300}
      TRANSFER_TOKEN_TTL_SECONDS: ${TRANSFER_TOKEN_TTL_SECONDS:-60}
      CHALLENGE_EXPIRATION_SECONDS: ${CHALLENGE_EXPIRATION_SECONDS:-120}
      KEYCLOAK_REALM_URL: ${KEYCLOAK_REALM_URL}
      KEYCLOAK_AUTH_ENDPOINT: ${KEYCLOAK_AUTH_ENDPOINT}
      KEYCLOAK_TOKEN_ENDPOINT: ${KEYCLOAK_TOKEN_ENDPOINT}
      KEYCLOAK_PAR_ENDPOINT: ${KEYCLOAK_PAR_ENDPOINT}
      KEYCLOAK_INTROSPECT_ENDPOINT: ${KEYCLOAK_INTROSPECT_ENDPOINT}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_REDIRECT_URI: ${KEYCLOAK_REDIRECT_URI}
      KEYCLOAK_CALLBACK_URI: ${KEYCLOAK_CALLBACK_URI}
      KEYCLOAK_SCOPE: ${KEYCLOAK_SCOPE:-openid profile}
      KEYCLOAK_ASSERTION_EXPIRATION_SECONDS: ${KEYCLOAK_ASSERTION_EXPIRATION_SECONDS:-60}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
      KEYCLOAK_ADMIN_REALM: ${KEYCLOAK_ADMIN_REALM}
      KEYCLOAK_IDP_ALIAS: ${KEYCLOAK_IDP_ALIAS}
      KEYCLOAK_SSO_PROXY_IDP_ALIAS: ${KEYCLOAK_SSO_PROXY_IDP_ALIAS}
      KEYCLOAK_ADMIN_TOKEN_ENDPOINT: ${KEYCLOAK_ADMIN_TOKEN_ENDPOINT}
      KEYCLOAK_ADMIN_BASE_URL: ${KEYCLOAK_ADMIN_BASE_URL}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./auth-service/keys:/etc/auth-service/keys:ro
    depends_on:
      postgres:
        condition: service_healthy

  app-mock:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/fileserver.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app-mock-react/dist:/srv:ro

  admin-mock:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/fileserver.conf:/etc/nginx/conf.d/default.conf:ro
      - ./admin-mock-react/dist:/srv:ro

  home:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/fileserver.conf:/etc/nginx/conf.d/default.conf:ro
      - ./home:/srv:ro

  target-app:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./target-app-react/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./target-app-react/dist:/srv:ro

  caddy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - keycloak
      - auth-service
      - app-mock
      - admin-mock
      - home
      - target-app

volumes:
  keycloak-postgres-data:
