apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-login
  namespace: device-login
  labels:
    app: device-login
spec:
  replicas: 1
  selector:
    matchLabels:
      app: device-login
  template:
    metadata:
      labels:
        app: device-login
    spec:
      containers:
        - name: device-login
          image: device-login:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: DB_URL
              value: jdbc:postgresql://device-postgres:5432/device_login
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: device-postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: device-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: JWT_PRIVATE_KEY_PATH
              value: /etc/device-login/keys/private.pem
            - name: JWT_PUBLIC_KEY_PATH
              value: /etc/device-login/keys/public.pem
            - name: JWT_ISSUER
              value: https://device-login.auth-sandbox.local
          volumeMounts:
            - name: jwt-keys
              mountPath: /etc/device-login/keys
              readOnly: true
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 0
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: jwt-keys
          secret:
            secretName: device-login-jwt-keys
---
apiVersion: v1
kind: Service
metadata:
  name: device-login
  namespace: device-login
spec:
  selector:
    app: device-login
  ports:
    - port: 80
      targetPort: 8081
