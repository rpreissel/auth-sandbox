apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: device-postgres-pvc
  namespace: device-login
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-postgres
  namespace: device-login
  labels:
    app: device-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: device-postgres
  template:
    metadata:
      labels:
        app: device-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: device-postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - device_login
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - device_login
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: device-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: device-postgres
  namespace: device-login
spec:
  selector:
    app: device-postgres
  ports:
    - port: 5432
      targetPort: 5432
