spring:
  application:
    name: device-login

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/keycloak}
    username: ${DB_USERNAME:device_login}
    password: ${DB_PASSWORD:device_login_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: device_login

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: device_login
    default-schema: device_login

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:/etc/device-login/keys/private.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:/etc/device-login/keys/public.pem}
    issuer: ${JWT_ISSUER:https://device-login.auth-sandbox.local}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:300}

  challenge:
    expiration-seconds: ${CHALLENGE_EXPIRATION_SECONDS:120}
