spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS device_login
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: device_login
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: device_login
    default-schema: device_login

app:
  jwt:
    private-key-path: classpath:test-keys/private.pem
    public-key-path: classpath:test-keys/public.pem
    issuer: https://device-login.test
    expiration-seconds: 300
  challenge:
    expiration-seconds: 120
