# target-app.localhost — OIDC Auth Code + PKCE target SPA
# /api/token is proxied to Keycloak to avoid CORS on the token endpoint
server {
    listen 443 ssl;
    http2 on;
    server_name target-app.localhost;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    location = /api/userinfo {
        proxy_pass         http://keycloak:8080/realms/auth-sandbox/protocol/openid-connect/userinfo;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto "https";
        proxy_set_header   X-Forwarded-Port  "8443";
    }

    location = /api/token {
        proxy_pass         http://keycloak:8080/realms/auth-sandbox/protocol/openid-connect/token;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto "https";
        proxy_set_header   X-Forwarded-Port  "8443";
    }

    location / {
        proxy_pass         http://target-app:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
