# app-mock.localhost — /api/* proxied to auth-service (same-origin, no CORS)
server {
    listen 443 ssl;
    http2 on;
    server_name app-mock.localhost;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    location = /api/userinfo {
        proxy_pass         http://keycloak:8080/realms/auth-sandbox/protocol/openid-connect/userinfo;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto "https";
        proxy_set_header   X-Forwarded-Port  "8443";
    }

    location /api/ {
        proxy_pass         http://auth-service:8083;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto "https";
        proxy_set_header   X-Forwarded-Port  "8443";
    }

    location / {
        proxy_pass         http://app-mock:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}

